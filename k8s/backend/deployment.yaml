apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: demo-k8s-practice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: sid1819/demo-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql://user:password@postgres-service:5432/db